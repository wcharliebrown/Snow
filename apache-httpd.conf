ServerName snow.local

# Set log directory to match httpd:2.4 defaults
Define APACHE_LOG_DIR /usr/local/apache2/logs

# Default virtual host
<VirtualHost *:80>
    DocumentRoot /var/www/html/public_html

    DirectoryIndex index.php index.html

    <Directory /var/www/html/public_html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Protect sensitive directories
    <Directory /var/www/html/functions>
        Require all denied
    </Directory>

    <Directory /var/www/html/logs>
        Require all denied
    </Directory>

    <Directory /var/www/html/keys>
        Require all denied
    </Directory>

    <Directory /var/www/html/plugins>
        Require all denied
    </Directory>

    <Directory /var/www/html/snapshots>
        Require all denied
    </Directory>

    # Proxy PHP files to PHP-FPM
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://php:9000"
    </FilesMatch>

    # Security headers
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options DENY
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog /usr/local/apache2/logs/snow_error.log
    CustomLog /usr/local/apache2/logs/snow_access.log combined
</VirtualHost>
