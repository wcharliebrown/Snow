services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: snow_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: snow
      MYSQL_USER: snow_user
      MYSQL_PASSWORD: snow_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database_schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - snow_network

  # PHP-FPM
  php:
    container_name: snow_php
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.php
    volumes:
      - ./:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      # Override .env values for Docker networking
      DB_HOST: mysql
      RUNNING_IN_DOCKER: "1"
    networks:
      - snow_network
    depends_on:
      - mysql

  # Apache Web Server (serves static assets + proxies PHP to PHP-FPM)
  apache:
    container_name: snow_apache
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.apache
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    networks:
      - snow_network
    depends_on:
      - php

volumes:
  mysql_data:

networks:
  snow_network:
    driver: bridge
