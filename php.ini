; Custom PHP configuration for Snow Framework
; Applied via Docker volume mount to /usr/local/etc/php/conf.d/custom.ini

; Error reporting (DEV: On / PROD: Off)
display_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/www/html/logs/php_errors.log

; Execution limits
max_execution_time = 300
memory_limit = 256M

; File uploads
upload_max_filesize = 20M
post_max_size = 20M

; Session configuration
; NOTE: cookie_secure should be On in production (HTTPS only)
session.cookie_httponly = 1
session.cookie_secure = 0
session.use_only_cookies = 1
session.gc_maxlifetime = 3600
session.cookie_samesite = Lax

; Date / Time
date.timezone = UTC

; Security
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; MySQL
pdo_mysql.default_socket =
