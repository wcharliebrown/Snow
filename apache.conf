ServerName snow.local

# Enable virtual host
<VirtualHost *:80>
    ServerName snow.local
    ServerAdmin webmaster@localhost
    
    # Document root points to public_html
    DocumentRoot /var/www/html/public_html
    
    # Directory configuration
    <Directory /var/www/html/public_html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    # Protect sensitive directories
    <Directory /var/www/html>
        <FilesMatch "^\.">
            Require all denied
        </FilesMatch>
    </Directory>
    
    <Directory /var/www/html/functions>
        Require all denied
    </Directory>
    
    <Directory /var/www/html/logs>
        Require all denied
    </Directory>
    
    <Directory /var/www/html/keys>
        Require all denied
    </Directory>
    
    <Directory /var/www/html/plugins>
        Require all denied
    </Directory>
    
    <Directory /var/www/html/snapshots>
        Require all denied
    </Directory>
    
    # Proxy PHP files to PHP-FPM
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://php:9000"
    </FilesMatch>
    
    # Set error and access logs
    ErrorLog ${APACHE_LOG_DIR}/snow_error.log
    CustomLog ${APACHE_LOG_DIR}/snow_access.log combined
    
    # Security headers
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options DENY
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</VirtualHost>

# Default virtual host
<VirtualHost *:80>
    DocumentRoot /var/www/html/public_html
    <Directory /var/www/html/public_html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://php:9000"
    </FilesMatch>
</VirtualHost>